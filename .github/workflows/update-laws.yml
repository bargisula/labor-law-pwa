name: 每週更新法規資料

on:
  schedule:
    - cron: '0 22 * * 0' # 每週一 06:00 台灣時間（UTC 週日 22:00）
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: 抓取最新法規
        run: node scripts/fetch-laws.mjs
      - name: 有變更就 commit + push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data public/data
          if git diff --cached --quiet; then
            echo "法規無異動，跳過"
          else
            git commit -m "data: 法規資料自動更新 $(date +%F)"
            git push
          fi
