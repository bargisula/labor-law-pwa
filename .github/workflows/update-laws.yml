name: 每週更新法規資料

on:
  schedule:
    - cron: '0 22 * * 0' # 每週一 06:00 台灣時間（UTC 週日 22:00）
  workflow_dispatch: {}
  push:
    branches: [main] # 程式碼更新也自動重新部署
    paths-ignore: ['README.md']

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: 抓取最新法規
        run: node scripts/fetch-laws.mjs
      - name: 有變更就 commit + push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data public/data
          if git diff --cached --quiet; then
            echo "法規無異動，跳過"
          else
            git commit -m "data: 法規資料自動更新 $(date +%F)"
            git push
          fi
      # 需要 repo secret：CLOUDFLARE_API_TOKEN（權限 Cloudflare Pages: Edit）
      # 沒設定 token 時此步驟自動跳過，網站就維持舊資料
      - name: 建置並部署到 Cloudflare Pages
        if: env.CF_TOKEN != ''
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 90b20a760ccf3485117fc56dc754e248
        run: |
          npm ci
          npm run build
          npx wrangler pages deploy dist --project-name labor-law-pwa
